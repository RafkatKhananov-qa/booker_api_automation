[pytest]
addopts = -v

testpaths = tests
python_files = test_*.py

markers =
    smoke: быстрые smoke-тесты
    regression: полный регрессион
    negative: негативные сценарии
    e2e: end-to-end тесты

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
